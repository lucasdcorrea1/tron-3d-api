services:
  api-3d:
    build: .
    ports:
      - "8090:8090"
    env_file:
      - .env
    environment:
      MONGO_URI: mongodb://mongo-3d:27017
      DB_NAME: tron_3d
      PORT: "8090"
    depends_on:
      mongo-3d:
        condition: service_started
    restart: unless-stopped

  mongo-3d:
    image: mongo:7
    ports:
      - "27019:27017"
    volumes:
      - mongo-3d-data:/data/db
    restart: unless-stopped

  mongo-express-3d:
    image: mongo-express
    ports:
      - "8083:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongo-3d:27017
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      - mongo-3d
    restart: unless-stopped

volumes:
  mongo-3d-data:
